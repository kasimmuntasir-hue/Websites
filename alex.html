<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #2b2b2b);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            width: 320px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #444;
        }

        .card h1 {
            font-size: 1.5rem;
            color: #f5f5f5;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 0.95rem;
            color: #bdbdbd;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 26px;
            border-radius: 25px;
            background: linear-gradient(135deg, #555, #222);
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #777, #333);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="alexx.jpg" alt="Profile">
        <h1>Hi, I'm Alex.</h1>
        <p>Welcome to my website.</p>
        <a href="http://localhost:8158/alex.html" class="btn">Explore</a>
    </div>

</body>
</html>
